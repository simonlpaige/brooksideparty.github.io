<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brookside Party Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&family=Creepster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="confetti.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="logo.jsx"></script>
  <script type="text/babel" src="brookside-info.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="shop-spookier.jsx"></script>
  <script type="text/babel" src="style-contact.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "featured": "graduation",
      "confettiIntensity": 2.5,
      "vibe": "playful"
    }/*EDITMODE-END*/;

    function App() {
      const [page, setPage] = React.useState("home");
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const burstedRef = React.useRef(false);

      // Set confetti intensity from tweaks
      React.useEffect(() => {
        if (window.Confetti) window.Confetti.setIntensity(tweaks.confettiIntensity);
      }, [tweaks.confettiIntensity]);

      // Burst on load (once)
      React.useEffect(() => {
        if (burstedRef.current) return;
        burstedRef.current = true;
        const t = setTimeout(() => window.Confetti && window.Confetti.burst(), 300);
        return () => clearTimeout(t);
      }, []);

      // Burst when navigating to home
      React.useEffect(() => {
        if (page === "home") {
          const t = setTimeout(() => window.Confetti && window.Confetti.burst(), 200);
          return () => clearTimeout(t);
        }
      }, [page]);

      // Scroll top on page change
      React.useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [page]);

      const isSpookier = page === "spookier";

      return (
        <div className="app" data-screen-label={page}>
          <Nav page={page} setPage={setPage} spookier={isSpookier} />
          {page === "home" && <HomePage featured={tweaks.featured} vibe={tweaks.vibe} />}
          {page === "shop" && <ShopPage />}
          {page === "spookier" && <SpookierPage />}
          {page === "style" && <StyleGuidePage />}
          {page === "contact" && <ContactPage />}

          <TweaksPanel title="Tweaks">
            <TweakSection title="Featured category">
              <TweakRadio
                value={tweaks.featured}
                onChange={(v) => setTweak("featured", v)}
                options={[
                  { value: "graduation", label: "Graduation" },
                  { value: "halloween", label: "Halloween" },
                  { value: "birthday", label: "Birthday" },
                ]}
              />
            </TweakSection>

            <TweakSection title="Confetti intensity">
              <TweakSlider
                value={tweaks.confettiIntensity}
                onChange={(v) => setTweak("confettiIntensity", v)}
                min={0.3} max={2.5} step={0.1}
                format={(v) => v.toFixed(1) + "×"}
              />
              <TweakButton onClick={() => window.Confetti.burst()}>Test burst 🎉</TweakButton>
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
